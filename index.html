<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>旅行のおとも君 — プロトタイプ</title>
<style>
  :root {
    --bg-page: #EDE7DA;
    --bg-app: #FAF8F2;
    --bg-elevated: #FFFFFF;
    --bg-sunken: #F1ECE0;
    --ink: #2B2A26;
    --ink-soft: #6E6A5F;
    --ink-faint: #9B9686;
    --line: #E5DFCF;
    --blue: #2E8FC0;
    --blue-soft: #DCEEF6;
    --orange: #E28A4D;
    --orange-soft: #FBE7D6;
    --green: #6FA37B;
    --green-soft: #E1EEE0;
    --red: #C1594A;
    --shadow-card: 0 1px 2px rgba(43,42,38,0.06), 0 8px 20px -10px rgba(43,42,38,0.18);
    --font-display: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --font-body: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page: #17160F;
      --bg-app: #1E1C16;
      --bg-elevated: #26241C;
      --bg-sunken: #2C291F;
      --ink: #F1ECE0;
      --ink-soft: #B8B2A0;
      --ink-faint: #837D6C;
      --line: #38352A;
      --blue: #6FB8E0;
      --blue-soft: #24384A;
      --orange: #F0A876;
      --orange-soft: #4A3220;
      --green: #93C79E;
      --green-soft: #253A2A;
      --red: #E08A7A;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 10px 24px -12px rgba(0,0,0,0.5);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg-page: #17160F;
    --bg-app: #1E1C16;
    --bg-elevated: #26241C;
    --bg-sunken: #2C291F;
    --ink: #F1ECE0;
    --ink-soft: #B8B2A0;
    --ink-faint: #837D6C;
    --line: #38352A;
    --blue: #6FB8E0;
    --blue-soft: #24384A;
    --orange: #F0A876;
    --orange-soft: #4A3220;
    --green: #93C79E;
    --green-soft: #253A2A;
    --red: #E08A7A;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 10px 24px -12px rgba(0,0,0,0.5);
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg-page: #EDE7DA;
    --bg-app: #FAF8F2;
    --bg-elevated: #FFFFFF;
    --bg-sunken: #F1ECE0;
    --ink: #2B2A26;
    --ink-soft: #6E6A5F;
    --ink-faint: #9B9686;
    --line: #E5DFCF;
    --blue: #2E8FC0;
    --blue-soft: #DCEEF6;
    --orange: #E28A4D;
    --orange-soft: #FBE7D6;
    --green: #6FA37B;
    --green-soft: #E1EEE0;
    --red: #C1594A;
    --shadow-card: 0 1px 2px rgba(43,42,38,0.06), 0 8px 20px -10px rgba(43,42,38,0.18);
    color-scheme: light;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--ink);
    font-family: var(--font-body);
    height: 100%;
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }
  .stage-label {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    font-family: var(--font-body);
  }

  /* --- phone frame --- */
  .phone {
    width: 390px;
    max-width: 100%;
    height: 844px;
    max-height: calc(100vh - 64px);
    background: var(--bg-app);
    border-radius: 44px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.45), 0 0 0 10px var(--bg-elevated), 0 0 0 11px var(--line);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 26px;
    background: var(--bg-elevated);
    border-radius: 0 0 16px 16px;
    z-index: 50;
  }
  .statusbar {
    height: 44px;
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .screens {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-app);
    transform: translateX(100%);
    transition: transform 320ms cubic-bezier(.32,.72,0,1);
    z-index: 1;
  }
  .screen.root { transform: translateX(0); z-index: 0; }
  .screen.active { transform: translateX(0); z-index: 10; }
  .screen.exit-left { transform: translateX(-30%); }

  .scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 24px;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* --- typography --- */
  h1, h2, h3 { font-family: var(--font-display); font-weight: 600; margin: 0; text-wrap: balance; }
  .screen-title { font-size: 20px; padding: 4px 20px 14px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 20px; margin: 22px 0 10px;
  }
  .section-head h2 { font-size: 17px; }
  .section-head .more { font-size: 12px; color: var(--blue); font-weight: 600; }
  p { margin: 0; }
  .muted { color: var(--ink-soft); }
  .faint { color: var(--ink-faint); }

  /* --- top bar with back button --- */
  .topbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    min-height: 46px;
  }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    border: none;
    color: var(--ink);
    flex: none;
  }
  .icon-btn svg { width: 17px; height: 17px; }

  /* --- location pill --- */
  .location-pill {
    margin: 6px 20px 0;
    display: flex; align-items: center; gap: 8px;
    color: var(--ink-soft);
    font-size: 13px;
  }
  .location-pill svg { width: 15px; height: 15px; color: var(--blue); flex: none; }
  .location-pill b { color: var(--ink); font-weight: 700; }
  .location-pill .change { color: var(--blue); font-weight: 700; font-size: 12px; }
  .location-pill { cursor: pointer; }

  /* --- location picker overlay --- */
  .loc-overlay {
    position: absolute; inset: 0;
    background: rgba(20,18,12,0.4);
    z-index: 90;
    display: flex; align-items: flex-end;
  }
  .loc-overlay[hidden] { display: none; }
  .loc-sheet {
    width: 100%;
    background: var(--bg-elevated);
    border-radius: 20px 20px 0 0;
    padding: 14px 20px 26px;
  }
  .loc-sheet h3 { font-size: 15px; margin-bottom: 4px; }
  .loc-option {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 13px 4px;
    border: none; background: none;
    font-size: 13.5px; font-weight: 600;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .loc-option.gps { color: var(--blue); }

  .brandline {
    padding: 14px 20px 2px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brandline .brand {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .brandline .brand span { color: var(--orange); }

  /* --- search bar --- */
  .searchbar {
    margin: 14px 20px 0;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated);
    border-radius: 14px;
    padding: 11px 14px;
    box-shadow: var(--shadow-card);
    color: var(--ink-faint);
    font-size: 14px;
  }
  .searchbar svg { width: 16px; height: 16px; flex: none; }

  /* --- chips row --- */
  .chiprow {
    display: flex; gap: 8px;
    padding: 14px 20px 4px;
    overflow-x: auto;
  }
  .chiprow::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    padding: 7px 13px;
    border-radius: 999px;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    border: none;
    white-space: nowrap;
  }
  .chip.on { background: var(--blue); color: white; box-shadow: none; }

  /* --- horizontal card rail --- */
  .rail { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; }
  .rail::-webkit-scrollbar { display: none; }

  .thumb {
    border-radius: 16px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.92);
    flex: none;
    overflow: hidden;
  }
  .thumb svg { width: 34%; height: 34%; opacity: 0.9; }
  .thumb::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.28) 100%);
  }
  .thumb img.ph, .hero img.ph {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-mini {
    width: 168px;
    background: var(--bg-elevated);
    border-radius: 18px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .card-mini .thumb { width: 100%; height: 108px; border-radius: 0; }
  .card-mini .body { padding: 10px 12px 12px; }
  .card-mini .name { font-size: 13.5px; font-weight: 700; line-height: 1.3; }
  .card-mini .meta { margin-top: 5px; font-size: 11.5px; color: var(--ink-soft); display: flex; gap: 6px; align-items: center; font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10.5px; font-weight: 700;
    padding: 3px 7px;
    border-radius: 7px;
  }
  .badge.blue { background: var(--blue-soft); color: var(--blue); }
  .badge.orange { background: var(--orange-soft); color: var(--orange); }
  .badge.green { background: var(--green-soft); color: var(--green); }
  .badge.open { background: var(--green-soft); color: var(--green); }
  .badge.busy { background: var(--orange-soft); color: var(--orange); }
  .badge.closed { background: var(--bg-sunken); color: var(--ink-faint); }

  /* --- full list card --- */
  .card-full {
    display: flex; gap: 12px;
    background: var(--bg-elevated);
    border-radius: 18px;
    box-shadow: var(--shadow-card);
    padding: 10px;
    margin: 0 20px 12px;
  }
  .card-full .thumb { width: 96px; height: 96px; flex: none; border-radius: 14px; }
  .card-full .body { flex: 1; min-width: 0; padding: 2px 4px; }
  .card-full .name { font-size: 14.5px; font-weight: 700; }
  .card-full .desc { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.45; }
  .card-full .meta { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  .plan-cta {
    margin: 18px 20px 4px;
    border-radius: 20px;
    padding: 18px;
    background: linear-gradient(135deg, var(--blue) 0%, #3AA0C9 55%, var(--orange) 130%);
    color: white;
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .plan-cta .t1 { font-family: var(--font-display); font-size: 16.5px; font-weight: 700; }
  .plan-cta .t2 { font-size: 12px; opacity: 0.92; margin-top: 4px; }
  .plan-cta button {
    background: rgba(255,255,255,0.94); color: var(--blue);
    border: none; border-radius: 12px; padding: 10px 14px;
    font-weight: 700; font-size: 12.5px; flex: none;
  }

  /* --- tab bar --- */
  .tabbar {
    flex: none;
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--bg-elevated);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tabbtn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 0 8px;
    background: none; border: none;
    color: var(--ink-faint);
    font-size: 10.5px;
    font-weight: 600;
  }
  .tabbtn svg { width: 21px; height: 21px; }
  .tabbtn.active { color: var(--blue); }

  /* --- segmented control --- */
  .segment {
    margin: 12px 20px 4px;
    display: flex;
    background: var(--bg-sunken);
    border-radius: 12px;
    padding: 3px;
  }
  .segment button {
    flex: 1; border: none; background: none;
    padding: 8px 0; border-radius: 9px;
    font-size: 12.5px; font-weight: 700; color: var(--ink-soft);
  }
  .segment button.on { background: var(--bg-elevated); color: var(--ink); box-shadow: var(--shadow-card); }

  /* --- map screen --- */
  .maparea {
    flex: 1;
    position: relative;
    background: var(--green-soft);
    overflow: hidden;
  }
  .maparea svg.roads { position: absolute; inset: 0; width: 100%; height: 100%; }
  .pin {
    position: absolute;
    width: 30px; height: 30px;
    transform: translate(-50%, -100%);
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.25));
  }
  .pin svg { width: 100%; height: 100%; }
  .pin.me { transform: translate(-50%, -50%); width: 20px; height: 20px; }
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--bg-elevated);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
    padding: 14px 16px 18px;
    transform: translateY(100%);
    transition: transform 260ms cubic-bezier(.32,.72,0,1);
  }
  .sheet.show { transform: translateY(0); }
  .sheet .grabber { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto 10px; }

  /* --- detail screen --- */
  .hero {
    height: 240px;
    position: relative;
    flex: none;
    overflow: hidden;
  }
  .hero .icon-btn { position: absolute; top: 14px; left: 14px; z-index: 5; background: rgba(255,255,255,0.85); }
  .detail-body { padding: 16px 20px 0; }
  .detail-title { font-size: 21px; }
  .tagrow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .infogrid {
    margin-top: 16px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .infogrid .cell {
    background: var(--bg-elevated); border-radius: 14px; padding: 11px 12px;
    box-shadow: var(--shadow-card);
  }
  .infogrid .cell .lbl { font-size: 10.5px; color: var(--ink-faint); font-weight: 700; letter-spacing: 0.04em; }
  .infogrid .cell .val { font-size: 13.5px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }

  .block { margin-top: 18px; }
  .block h3 { font-size: 14px; }
  .block .txt { font-size: 13px; color: var(--ink-soft); line-height: 1.65; margin-top: 6px; }

  .congestion-bar {
    display: flex; gap: 4px; margin-top: 8px;
  }
  .congestion-bar i { flex: 1; height: 7px; border-radius: 4px; background: var(--bg-sunken); }
  .congestion-bar i.on { background: var(--orange); }

  .actionrow {
    display: flex; gap: 8px;
    margin: 20px 20px 22px;
  }
  .actionrow button {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 11px 4px;
    border-radius: 14px;
    border: none;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 10.5px; font-weight: 700; color: var(--ink);
  }
  .actionrow button.primary { background: var(--blue); color: white; box-shadow: none; }
  .actionrow svg { width: 18px; height: 18px; }

  /* --- form (plan create) --- */
  .field { padding: 0 20px; margin-top: 20px; }
  .field label { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .pillselect { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
  .pillselect button {
    padding: 9px 14px; border-radius: 12px; border: none;
    background: var(--bg-elevated); box-shadow: var(--shadow-card);
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  }
  .pillselect button.on { background: var(--orange); color: white; box-shadow: none; }
  .stepper {
    margin-top: 9px;
    display: inline-flex; align-items: center; gap: 14px;
    background: var(--bg-elevated); box-shadow: var(--shadow-card);
    border-radius: 12px; padding: 8px 16px;
  }
  .stepper button { width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--bg-sunken); font-weight: 800; color: var(--ink); font-size: 15px; }
  .stepper .n { font-weight: 700; font-size: 14.5px; min-width: 18px; text-align: center; font-variant-numeric: tabular-nums; }
  .textinput {
    margin-top: 9px;
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 13.5px;
    color: var(--ink);
    font-family: var(--font-body);
  }
  .textinput::placeholder { color: var(--ink-faint); }
  .generate-btn {
    margin: 26px 20px 20px;
    width: calc(100% - 40px);
    padding: 15px;
    border: none; border-radius: 16px;
    background: var(--blue); color: white;
    font-size: 14.5px; font-weight: 700;
    box-shadow: var(--shadow-card);
  }

  /* --- plan detail --- */
  .plan-hero {
    padding: 18px 20px 16px;
    background: linear-gradient(135deg, var(--blue-soft), var(--orange-soft));
  }
  .plan-hero .kicker { font-size: 11.5px; font-weight: 700; color: var(--ink-soft); letter-spacing: 0.05em; }
  .plan-hero h2 { font-size: 19px; margin-top: 4px; }
  .plan-hero .sub { margin-top: 6px; font-size: 12px; color: var(--ink-soft); display: flex; gap: 10px; flex-wrap: wrap; }

  .timeline { padding: 18px 20px 4px; }
  .tl-item { display: flex; gap: 12px; }
  .tl-time { width: 44px; flex: none; font-size: 12px; font-weight: 700; color: var(--ink-soft); padding-top: 3px; font-variant-numeric: tabular-nums; }
  .tl-rail { flex: none; width: 20px; display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--blue); margin-top: 4px; flex: none; }
  .tl-line { width: 2px; flex: 1; background: var(--line); margin: 3px 0; min-height: 26px; }
  .tl-content { flex: 1; padding-bottom: 20px; }
  .tl-content .place { font-size: 14px; font-weight: 700; }
  .tl-content .note { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.5; }
  .tl-move { font-size: 11px; color: var(--ink-faint); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .tl-move svg { width: 12px; height: 12px; }
  .tl-item.move .tl-dot { background: var(--ink-faint); width: 7px; height: 7px; margin-top: 6px; }

  .tips-card {
    margin: 6px 20px 16px;
    background: var(--green-soft);
    border-radius: 16px;
    padding: 14px 16px;
  }
  .tips-card h3 { font-size: 13px; color: var(--green); }
  .tips-card p { font-size: 12.5px; color: var(--ink-soft); margin-top: 6px; line-height: 1.6; }

  .save-row {
    display: flex; gap: 10px;
    padding: 6px 20px 22px;
  }
  .save-row button {
    flex: 1; padding: 13px; border-radius: 14px; border: none;
    font-size: 13px; font-weight: 700;
    box-shadow: var(--shadow-card);
  }
  .save-row .save { background: var(--blue); color: white; box-shadow: none; }
  .save-row .route { background: var(--bg-elevated); color: var(--ink); }

  .empty-note { text-align: center; padding: 40px 30px; color: var(--ink-faint); font-size: 12.5px; line-height: 1.7; }

  /* スマホ実機では枠を外して全画面アプリ表示にする */
  @media (max-width: 500px) {
    body { padding: 0; }
    .stage-label { display: none; }
    .phone {
      width: 100%;
      height: 100dvh;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
      padding-top: env(safe-area-inset-top, 0);
    }
    .notch { display: none; }
    .statusbar { display: none; }
  }

  /* --- toast --- */
  .toast {
    position: absolute;
    left: 20px; right: 20px; bottom: 78px;
    background: var(--ink);
    color: var(--bg-app);
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 12.5px;
    font-weight: 600;
    text-align: center;
    box-shadow: var(--shadow-card);
    z-index: 100;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 220ms ease, transform 220ms ease;
  }

const LOCATIONS = [
  {name:'祇園・八坂神社周辺', lat:35.0037, lng:135.7786},
  {name:'京都駅', lat:34.9858, lng:135.7585},

  {name:'清水寺周辺', lat:34.9950, lng:135.7820},
  {name:'嵐山', lat:35.0094, lng:135.6795},
  {name:'出町柳・鴨川デルタ', lat:35.0299, lng:135.7714},
];
let currentLoc = {...LOCATIONS[0]};

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, r=x=>x*Math.PI/180;
  const dLat=r(lat2-lat1), dLng=r(lng2-lng1);
  const s=Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function recomputeDistances(){
  ALL_PLACES.forEach(p=>{
    const d = haversine(currentLoc.lat,currentLoc.lng,p.ll[0],p.ll[1]);
    p.distanceM = Math.round(d);
    const wm = Math.max(1, Math.round(d/75));
    if(wm<=30){ p.walk=wm; p.train=0; }
    else { p.walk=0; p.train=Math.max(5, Math.round(d/450)+8); }
    p.taxi = Math.max(3, Math.round(d/350));
  });
}

function applyLocation(loc){
  currentLoc = loc;
  recomputeDistances();
  document.querySelectorAll('.loc-name').forEach(el=>el.textContent=loc.name);
  renderAll();
  closeLocSheet();
  showToast('現在地を「'+loc.name+'」に変更しました');
}

function closeLocSheet(){ document.getElementById('loc-overlay').hidden = true; }
function useGPS(){
  if(!navigator.geolocation){ showToast('この端末では位置情報を取得できません'); return; }
  showToast('位置情報を取得しています…');
  navigator.geolocation.getCurrentPosition(
    pos=>applyLocation({name:'現在地(GPS)', lat:pos.coords.latitude, lng:pos.coords.longitude}),
    ()=>showToast('位置情報を取得できませんでした。ブラウザの許可設定を確認してください'),
    {timeout:8000}
  );
}

/* 地図座標系: 京都市エリアの緯度経度を%座標へ変換 */
const MAP_BOUNDS = {minLng:135.655, maxLng:135.805, minLat:34.950, maxLat:35.042};
function projX(lng){
  const t=(lng-MAP_BOUNDS.minLng)/(MAP_BOUNDS.maxLng-MAP_BOUNDS.minLng);
  return Math.max(4, Math.min(96, t*100));
}
function projY(lat){
  const t=(MAP_BOUNDS.maxLat-lat)/(MAP_BOUNDS.maxLat-MAP_BOUNDS.minLat);
  return Math.max(5, Math.min(93, t*100));
}

}

function renderTabbars(){

    if(!el) return;
    el.innerHTML = TABS.map(t=>`

  currentTab = key;
  const target = TABS.find(t=>t.key===key).screen;

function go(name){
  const map = {
    'search':'screen-search','map':'screen-map','list':'screen-list',
    'detail':'screen-detail','plan-form':'screen-plan-form','plan-detail':'screen-plan-detail'
  };
  navStack.push(map[name]||name);
  showTop();
}

function back(){
  if(navStack.length>1){ navStack.pop(); showTop(); }
}

function showTop(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const topId = navStack[navStack.length-1];
  const el = document.getElementById(topId);
  if(topId!=='screen-home' || navStack.length>1){
    el.classList.add('active');
  }
  if(navStack.length===1){
    document.getElementById(navStack[0]).classList.add('active');
  }
}

      ${p.menu ? `<div class="block"><h3>おすすめメニュー</h3><p class="txt">${p.recommendedMenu}<br><span class="faint">他: ${p.menu.filter(m=>m!==p.recommendedMenu).join('・')}</span></p></div>` : ''}

      <div class="block">
        <h3>混雑状況・話題度</h3>
        <div class="congestion-bar">
          <i class="${p.congestion>=1?'on':''}"></i><i class="${p.congestion>=2?'on':''}"></i><i class="${p.congestion>=3?'on':''}"></i>
        </div>
        <p class="txt">現在: ${congestionLabel} ・ ${p.isOpen?'営業中':'営業時間外'} ${p.sns?'・ SNSで話題':''} ${p.local?'・ 地元民に人気':''}</p>
      </div>

      <div class="block">
        <h3>おすすめポイント</h3>
        <p class="txt">${p.recommend}</p>
      </div>
      <div class="block">
        <h3>注意点</h3>
        <p class="txt">${p.caution}</p>
      </div>
      <div class="block">
        <h3>こんな人におすすめ</h3>
        <p class="txt">${p.forWhom.join(' / ')}</p>
      </div>
    </div>

    <div class="actionrow">
      <button class="primary" onclick="showToast('Googleマップ連携はプロトタイプでは未接続です')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/></svg>地図で開く
      </button>
      ${p.phone? `<button onclick="showToast('${p.phone} に発信します(プロトタイプ)')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.9v3a2 2 0 01-2.2 2 19.8 19.8 0 01-8.6-3.1 19.5 19.5 0 01-6-6A19.8 19.8 0 012.1 4.2 2 2 0 014.1 2h3a2 2 0 012 1.7c.1.9.3 1.8.6 2.7a2 2 0 01-.4 2.1L8.1 9.7a16 16 0 006.2 6.2l1.2-1.2a2 2 0 012.1-.4c.9.3 1.8.5 2.7.6a2 2 0 011.7 2z"/></svg>電話
      </button>` : `<button onclick="showToast('この場所の予約リンクはダミーです')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 10h16"/></svg>予約
      </button>`}
      <button onclick="showToast('公式サイトはプロトタイプでは未接続です')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a15 15 0 010 18 15 15 0 010-18z"/></svg>公式サイト
      </button>
    </div>
  `;
  go('detail');
}

/* ---- plan form ---- */
let pf = { days:'1泊2日', people:2, styles:['定番'], budget:'普通' };
function renderPlanForm(){
  document.getElementById('pf-days').innerHTML = ['日帰り','1泊2日','2泊3日'].map(d=>
    `<button class="${pf.days===d?'on':''}" onclick="pfSetDays('${d}')">${d}</button>`).join('');
  document.getElementById('pf-style').innerHTML = ['定番','ゆったり','食べ歩き','カフェ巡り','神社仏閣','子連れ','カップル','雨の日'].map(s=>
    `<button class="${pf.styles.includes(s)?'on':''}" onclick="pfToggleStyle('${s}')">${s}</button>`).join('');
  document.getElementById('pf-budget').innerHTML = ['おさえめ','普通','贅沢したい'].map(b=>
    `<button class="${pf.budget===b?'on':''}" onclick="pfSetBudget('${b}')">${b}</button>`).join('');
  document.getElementById('pf-people-n').textContent = pf.people;
}
function pfSetDays(d){ pf.days=d; renderPlanForm(); }
function pfToggleStyle(s){
  if(pf.styles.includes(s)) pf.styles = pf.styles.filter(x=>x!==s);
  else pf.styles.push(s);
  renderPlanForm();
}
function pfSetBudget(b){ pf.budget=b; renderPlanForm(); }
function pfChangePeople(delta){ pf.people = Math.max(1, Math.min(8, pf.people+delta)); renderPlanForm(); }

function pickTemplate(){
  if(pf.styles.includes('雨の日')) return PLAN_TEMPLATES['日帰り_雨の日'];
  if(pf.days==='2泊3日' || pf.styles.includes('ゆったり')) return PLAN_TEMPLATES['2泊3日_ゆったり'];
  if(pf.days==='日帰り') return PLAN_TEMPLATES['日帰り_雨の日'];
  return PLAN_TEMPLATES['1泊2日_定番'];
}

function generatePlan(){
  const tpl = pickTemplate();
  const hotel = document.getElementById('pf-hotel').value || '京都駅周辺のホテル';
  renderPlanDetail(tpl, hotel);
  go('plan-detail');
}

function placeIconFor(name){
  const p = ALL_PLACES.find(x=>x.name===name);
  return p ? p.icon : 'temple';
}

function renderPlanDetail(tpl, hotel){
  const daysHtml = tpl.days.map((day, di)=>`
    <div class="section-head" style="margin-top:${di===0?'0':'22px'};"><h2>${di+1}日目</h2></div>
    <div class="timeline">
      ${day.map((item,i)=>{
        const isMove = item.place==='move';
        const isLast = i===day.length-1;
        if(isMove){
          return `<div class="tl-item move">
            <div class="tl-time">${item.time}</div>
            <div class="tl-rail"><div class="tl-dot"></div>${!isLast?'<div class=\"tl-line\"></div>':''}</div>
            <div class="tl-content"><div class="tl-move">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
              ${item.move.mode}で約${item.move.min}分移動
            </div></div>
          </div>`;
        }
        return `<div class="tl-item" onclick="tryOpenFromPlan('${item.place}')">
          <div class="tl-time">${item.time}</div>
          <div class="tl-rail"><div class="tl-dot"></div>${!isLast?'<div class=\"tl-line\"></div>':''}</div>
          <div class="tl-content">
            <div class="place">${item.place}</div>
            <div class="note">${item.note}</div>
          </div>
        </div>`;
      }).join('')}
    </div>
  `).join('');

  document.getElementById('plan-detail-scroll').innerHTML = `
    <div class="topbar">
      <button class="icon-btn" onclick="back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
    </div>
    <div class="plan-hero">
      <div class="kicker">宿泊地: ${hotel} ・ ${pf.people}名</div>
      <h2>${tpl.title}</h2>
      <div class="sub">
        <span class="badge blue">${pf.days}</span>
        ${pf.styles.map(s=>`<span class="badge orange">${s}</span>`).join('')}
        <span class="badge green">${pf.budget}</span>
      </div>
    </div>
    ${daysHtml}
    <div class="tips-card">
      <h3>混雑を避けるコツ</h3>
      <p>${tpl.tip}</p>
    </div>
    <div class="section-head"><h2>予算目安</h2></div>
    <p style="padding:0 20px; font-size:13px; color:var(--ink-soft);">${tpl.budget}</p>
    <div class="save-row" style="margin-top:18px;">
      <button class="route" onclick="showToast('Googleマップでのルート確認はプロトタイプでは未接続です')">ルートを確認</button>
      <button class="save" onclick="showToast('プランを保存しました(プロトタイプ)')">プランを保存</button>
    </div>
  `;
}
function tryOpenFromPlan(name){
  const p = ALL_PLACES.find(x=>x.name===name);
  if(p) openDetail(p.id);
}

/* ---- toast ---- */
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2200);
}

/* ---- clock ---- */
function tickClock(){
  const d = new Date();
  document.getElementById('clock').textContent = d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit',hour12:false});
}

/* ---- init ---- */
function renderAll(){
  renderTabbars();
  renderChips();
  renderRails();
  renderMapSegment();
  mountPins('map-pins', mapCatKey);
  renderListScreen();
  renderPlanForm();
}
recomputeDistances();
renderLocPresets();
renderAll();
tickClock();
setInterval(tickClock, 30000);
</script>
