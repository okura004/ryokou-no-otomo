<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>旅行のおとも君 — プロトタイプ</title>
<style>
  :root {
    --bg-page: #EDE7DA;
    --bg-app: #FAF8F2;
    --bg-elevated: #FFFFFF;
    --bg-sunken: #F1ECE0;
    --ink: #2B2A26;
    --ink-soft: #6E6A5F;
    --ink-faint: #9B9686;
    --line: #E5DFCF;
    --blue: #2E8FC0;
    --blue-soft: #DCEEF6;
    --orange: #E28A4D;
    --orange-soft: #FBE7D6;
    --green: #6FA37B;
    --green-soft: #E1EEE0;
    --red: #C1594A;
    --shadow-card: 0 1px 2px rgba(43,42,38,0.06), 0 8px 20px -10px rgba(43,42,38,0.18);
    --font-display: "Shippori Mincho", "Hiragino Mincho ProN", "Yu Mincho", serif;
    --font-body: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Noto Sans JP", system-ui, sans-serif;
    color-scheme: light;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-page: #17160F;
      --bg-app: #1E1C16;
      --bg-elevated: #26241C;
      --bg-sunken: #2C291F;
      --ink: #F1ECE0;
      --ink-soft: #B8B2A0;
      --ink-faint: #837D6C;
      --line: #38352A;
      --blue: #6FB8E0;
      --blue-soft: #24384A;
      --orange: #F0A876;
      --orange-soft: #4A3220;
      --green: #93C79E;
      --green-soft: #253A2A;
      --red: #E08A7A;
      --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 10px 24px -12px rgba(0,0,0,0.5);
      color-scheme: dark;
    }
  }
  :root[data-theme="dark"] {
    --bg-page: #17160F;
    --bg-app: #1E1C16;
    --bg-elevated: #26241C;
    --bg-sunken: #2C291F;
    --ink: #F1ECE0;
    --ink-soft: #B8B2A0;
    --ink-faint: #837D6C;
    --line: #38352A;
    --blue: #6FB8E0;
    --blue-soft: #24384A;
    --orange: #F0A876;
    --orange-soft: #4A3220;
    --green: #93C79E;
    --green-soft: #253A2A;
    --red: #E08A7A;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 10px 24px -12px rgba(0,0,0,0.5);
    color-scheme: dark;
  }
  :root[data-theme="light"] {
    --bg-page: #EDE7DA;
    --bg-app: #FAF8F2;
    --bg-elevated: #FFFFFF;
    --bg-sunken: #F1ECE0;
    --ink: #2B2A26;
    --ink-soft: #6E6A5F;
    --ink-faint: #9B9686;
    --line: #E5DFCF;
    --blue: #2E8FC0;
    --blue-soft: #DCEEF6;
    --orange: #E28A4D;
    --orange-soft: #FBE7D6;
    --green: #6FA37B;
    --green-soft: #E1EEE0;
    --red: #C1594A;
    --shadow-card: 0 1px 2px rgba(43,42,38,0.06), 0 8px 20px -10px rgba(43,42,38,0.18);
    color-scheme: light;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-page);
    color: var(--ink);
    font-family: var(--font-body);
    height: 100%;
  }
  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 16px;
    min-height: 100vh;
  }
  .stage-label {
    position: fixed;
    top: 14px; left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-faint);
    font-family: var(--font-body);
  }

  /* --- phone frame --- */
  .phone {
    width: 390px;
    max-width: 100%;
    height: 844px;
    max-height: calc(100vh - 64px);
    background: var(--bg-app);
    border-radius: 44px;
    box-shadow: 0 30px 60px -20px rgba(0,0,0,0.45), 0 0 0 10px var(--bg-elevated), 0 0 0 11px var(--line);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }
  .notch {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 120px; height: 26px;
    background: var(--bg-elevated);
    border-radius: 0 0 16px 16px;
    z-index: 50;
  }
  .statusbar {
    height: 44px;
    flex: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 26px;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
  }

  .screens {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    background: var(--bg-app);
    transform: translateX(100%);
    transition: transform 320ms cubic-bezier(.32,.72,0,1);
    z-index: 1;
  }
  .screen.root { transform: translateX(0); z-index: 0; }
  .screen.active { transform: translateX(0); z-index: 10; }
  .screen.exit-left { transform: translateX(-30%); }

  .scroll {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 24px;
  }
  .scroll::-webkit-scrollbar { display: none; }

  /* --- typography --- */
  h1, h2, h3 { font-family: var(--font-display); font-weight: 600; margin: 0; text-wrap: balance; }
  .screen-title { font-size: 20px; padding: 4px 20px 14px; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 0 20px; margin: 22px 0 10px;
  }
  .section-head h2 { font-size: 17px; }
  .section-head .more { font-size: 12px; color: var(--blue); font-weight: 600; }
  p { margin: 0; }
  .muted { color: var(--ink-soft); }
  .faint { color: var(--ink-faint); }

  /* --- top bar with back button --- */
  .topbar {
    flex: none;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    min-height: 46px;
  }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    border: none;
    color: var(--ink);
    flex: none;
  }
  .icon-btn svg { width: 17px; height: 17px; }

  /* --- location pill --- */
  .location-pill {
    margin: 6px 20px 0;
    display: flex; align-items: center; gap: 8px;
    color: var(--ink-soft);
    font-size: 13px;
  }
  .location-pill svg { width: 15px; height: 15px; color: var(--blue); flex: none; }
  .location-pill b { color: var(--ink); font-weight: 700; }
  .location-pill .change { color: var(--blue); font-weight: 700; font-size: 12px; }
  .location-pill { cursor: pointer; }

  /* --- location picker overlay --- */
  .loc-overlay {
    position: absolute; inset: 0;
    background: rgba(20,18,12,0.4);
    z-index: 90;
    display: flex; align-items: flex-end;
  }
  .loc-overlay[hidden] { display: none; }
  .loc-sheet {
    width: 100%;
    background: var(--bg-elevated);
    border-radius: 20px 20px 0 0;
    padding: 14px 20px 26px;
  }
  .loc-sheet h3 { font-size: 15px; margin-bottom: 4px; }
  .loc-option {
    display: flex; align-items: center; gap: 10px;
    width: 100%;
    padding: 13px 4px;
    border: none; background: none;
    font-size: 13.5px; font-weight: 600;
    color: var(--ink);
    border-bottom: 1px solid var(--line);
    text-align: left;
  }
  .loc-option.gps { color: var(--blue); }

  .brandline {
    padding: 14px 20px 2px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .brandline .brand {
    font-family: var(--font-display);
    font-size: 21px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }
  .brandline .brand span { color: var(--orange); }

  /* --- search bar --- */
  .searchbar {
    margin: 14px 20px 0;
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-elevated);
    border-radius: 14px;
    padding: 11px 14px;
    box-shadow: var(--shadow-card);
    color: var(--ink-faint);
    font-size: 14px;
  }
  .searchbar svg { width: 16px; height: 16px; flex: none; }

  /* --- chips row --- */
  .chiprow {
    display: flex; gap: 8px;
    padding: 14px 20px 4px;
    overflow-x: auto;
  }
  .chiprow::-webkit-scrollbar { display: none; }
  .chip {
    flex: none;
    padding: 7px 13px;
    border-radius: 999px;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-soft);
    border: none;
    white-space: nowrap;
  }
  .chip.on { background: var(--blue); color: white; box-shadow: none; }

  /* --- horizontal card rail --- */
  .rail { display: flex; gap: 12px; padding: 0 20px; overflow-x: auto; }
  .rail::-webkit-scrollbar { display: none; }
  /* PCではドラッグで横スクロールできることを示す */
  @media (hover: hover) and (pointer: fine) {
    .rail, .chiprow { cursor: grab; }
    .rail:active, .chiprow:active { cursor: grabbing; }
  }

  .thumb {
    border-radius: 16px;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.92);
    flex: none;
    overflow: hidden;
  }
  .thumb svg { width: 34%; height: 34%; opacity: 0.9; }
  .thumb::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0) 40%, rgba(0,0,0,0.28) 100%);
  }
  .thumb img.ph, .hero img.ph {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }

  .card-mini {
    width: 168px;
    flex: none;
    background: var(--bg-elevated);
    border-radius: 18px;
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }
  .card-mini .thumb { width: 100%; height: 108px; border-radius: 0; }
  .card-mini .body { padding: 10px 12px 12px; }
  .card-mini .name { font-size: 13.5px; font-weight: 700; line-height: 1.3; }
  .card-mini .meta { margin-top: 5px; font-size: 11.5px; color: var(--ink-soft); display: flex; gap: 6px; align-items: center; font-variant-numeric: tabular-nums; }

  .badge {
    display: inline-flex; align-items: center; gap: 3px;
    font-size: 10.5px; font-weight: 700;
    padding: 3px 7px;
    border-radius: 7px;
  }
  .badge.blue { background: var(--blue-soft); color: var(--blue); }
  .badge.orange { background: var(--orange-soft); color: var(--orange); }
  .badge.green { background: var(--green-soft); color: var(--green); }
  .badge.open { background: var(--green-soft); color: var(--green); }
  .badge.busy { background: var(--orange-soft); color: var(--orange); }
  .badge.closed { background: var(--bg-sunken); color: var(--ink-faint); }

  /* --- full list card --- */
  .card-full {
    display: flex; gap: 12px;
    background: var(--bg-elevated);
    border-radius: 18px;
    box-shadow: var(--shadow-card);
    padding: 10px;
    margin: 0 20px 12px;
  }
  .card-full .thumb { width: 96px; height: 96px; flex: none; border-radius: 14px; }
  .card-full .body { flex: 1; min-width: 0; padding: 2px 4px; }
  .card-full .name { font-size: 14.5px; font-weight: 700; }
  .card-full .desc { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.45; }
  .card-full .meta { margin-top: 7px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

  .plan-cta {
    margin: 18px 20px 4px;
    border-radius: 20px;
    padding: 18px;
    background: linear-gradient(135deg, var(--blue) 0%, #3AA0C9 55%, var(--orange) 130%);
    color: white;
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .plan-cta .t1 { font-family: var(--font-display); font-size: 16.5px; font-weight: 700; }
  .plan-cta .t2 { font-size: 12px; opacity: 0.92; margin-top: 4px; }
  .plan-cta button {
    background: rgba(255,255,255,0.94); color: var(--blue);
    border: none; border-radius: 12px; padding: 10px 14px;
    font-weight: 700; font-size: 12.5px; flex: none;
  }

  /* --- tab bar --- */
  .tabbar {
    flex: none;
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--bg-elevated);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tabbtn {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 0 8px;
    background: none; border: none;
    color: var(--ink-faint);
    font-size: 10.5px;
    font-weight: 600;
  }
  .tabbtn svg { width: 21px; height: 21px; }
  .tabbtn.active { color: var(--blue); }

  /* --- segmented control --- */
  .segment {
    margin: 12px 20px 4px;
    display: flex;
    background: var(--bg-sunken);
    border-radius: 12px;
    padding: 3px;
  }
  .segment button {
    flex: 1; border: none; background: none;
    padding: 8px 0; border-radius: 9px;
    font-size: 12.5px; font-weight: 700; color: var(--ink-soft);
  }
  .segment button.on { background: var(--bg-elevated); color: var(--ink); box-shadow: var(--shadow-card); }

  /* --- map screen --- */
  .maparea {
    flex: 1;
    position: relative;
    background: var(--green-soft);
    overflow: hidden;
  }
  .gmaps-fab {
    position: absolute;
    right: 12px;
    bottom: 14px;
    z-index: 5;
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    background: var(--bg-elevated);
    color: var(--ink);
    box-shadow: var(--shadow-card);
    cursor: pointer;
  }
  .maparea svg.roads { position: absolute; inset: 0; width: 100%; height: 100%; }
  .pin {
    position: absolute;
    width: 30px; height: 30px;
    transform: translate(-50%, -100%);
    display: flex; align-items: center; justify-content: center;
    filter: drop-shadow(0 3px 5px rgba(0,0,0,0.25));
  }
  .pin svg { width: 100%; height: 100%; }
  .pin.me { transform: translate(-50%, -50%); width: 20px; height: 20px; }
  .sheet {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: var(--bg-elevated);
    border-radius: 20px 20px 0 0;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
    padding: 14px 16px 18px;
    transform: translateY(100%);
    transition: transform 260ms cubic-bezier(.32,.72,0,1);
  }
  .sheet.show { transform: translateY(0); }
  .sheet .grabber { width: 36px; height: 4px; border-radius: 2px; background: var(--line); margin: 0 auto 10px; }

  /* --- detail screen --- */
  .hero {
    height: 240px;
    position: relative;
    flex: none;
    overflow: hidden;
  }
  .hero .icon-btn { position: absolute; top: 14px; left: 14px; z-index: 5; background: rgba(255,255,255,0.85); }
  .detail-body { padding: 16px 20px 0; }
  .detail-title { font-size: 21px; }
  .tagrow { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .infogrid {
    margin-top: 16px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .infogrid .cell {
    background: var(--bg-elevated); border-radius: 14px; padding: 11px 12px;
    box-shadow: var(--shadow-card);
  }
  .infogrid .cell .lbl { font-size: 10.5px; color: var(--ink-faint); font-weight: 700; letter-spacing: 0.04em; }
  .infogrid .cell .val { font-size: 13.5px; font-weight: 700; margin-top: 3px; font-variant-numeric: tabular-nums; }

  .block { margin-top: 18px; }
  .block h3 { font-size: 14px; }
  .block .txt { font-size: 13px; color: var(--ink-soft); line-height: 1.65; margin-top: 6px; }

  .congestion-bar {
    display: flex; gap: 4px; margin-top: 8px;
  }
  .congestion-bar i { flex: 1; height: 7px; border-radius: 4px; background: var(--bg-sunken); }
  .congestion-bar i.on { background: var(--orange); }

  .actionrow {
    display: flex; gap: 8px;
    margin: 20px 20px 22px;
  }
  .actionrow button {
    flex: 1;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    padding: 11px 4px;
    border-radius: 14px;
    border: none;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 10.5px; font-weight: 700; color: var(--ink);
  }
  .actionrow button.primary { background: var(--blue); color: white; box-shadow: none; }
  .actionrow svg { width: 18px; height: 18px; }

  /* --- form (plan create) --- */
  .field { padding: 0 20px; margin-top: 20px; }
  .field label { font-size: 12.5px; font-weight: 700; color: var(--ink-soft); }
  .pillselect { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 9px; }
  .pillselect button {
    padding: 9px 14px; border-radius: 12px; border: none;
    background: var(--bg-elevated); box-shadow: var(--shadow-card);
    font-size: 12.5px; font-weight: 600; color: var(--ink-soft);
  }
  .pillselect button.on { background: var(--orange); color: white; box-shadow: none; }
  .stepper {
    margin-top: 9px;
    display: inline-flex; align-items: center; gap: 14px;
    background: var(--bg-elevated); box-shadow: var(--shadow-card);
    border-radius: 12px; padding: 8px 16px;
  }
  .stepper button { width: 24px; height: 24px; border-radius: 50%; border: none; background: var(--bg-sunken); font-weight: 800; color: var(--ink); font-size: 15px; }
  .stepper .n { font-weight: 700; font-size: 14.5px; min-width: 18px; text-align: center; font-variant-numeric: tabular-nums; }
  .textinput {
    margin-top: 9px;
    width: 100%;
    padding: 12px 14px;
    border-radius: 12px;
    border: none;
    background: var(--bg-elevated);
    box-shadow: var(--shadow-card);
    font-size: 13.5px;
    color: var(--ink);
    font-family: var(--font-body);
  }
  .textinput::placeholder { color: var(--ink-faint); }
  .generate-btn {
    margin: 26px 20px 20px;
    width: calc(100% - 40px);
    padding: 15px;
    border: none; border-radius: 16px;
    background: var(--blue); color: white;
    font-size: 14.5px; font-weight: 700;
    box-shadow: var(--shadow-card);
  }

  /* --- plan detail --- */
  .plan-hero {
    padding: 18px 20px 16px;
    background: linear-gradient(135deg, var(--blue-soft), var(--orange-soft));
  }
  .plan-hero .kicker { font-size: 11.5px; font-weight: 700; color: var(--ink-soft); letter-spacing: 0.05em; }
  .plan-hero h2 { font-size: 19px; margin-top: 4px; }
  .plan-hero .sub { margin-top: 6px; font-size: 12px; color: var(--ink-soft); display: flex; gap: 10px; flex-wrap: wrap; }

  .timeline { padding: 18px 20px 4px; }
  .tl-item { display: flex; gap: 12px; }
  .tl-time { width: 44px; flex: none; font-size: 12px; font-weight: 700; color: var(--ink-soft); padding-top: 3px; font-variant-numeric: tabular-nums; }
  .tl-rail { flex: none; width: 20px; display: flex; flex-direction: column; align-items: center; }
  .tl-dot { width: 11px; height: 11px; border-radius: 50%; background: var(--blue); margin-top: 4px; flex: none; }
  .tl-line { width: 2px; flex: 1; background: var(--line); margin: 3px 0; min-height: 26px; }
  .tl-content { flex: 1; padding-bottom: 20px; }
  .tl-content .place { font-size: 14px; font-weight: 700; }
  .tl-content .note { font-size: 12px; color: var(--ink-soft); margin-top: 3px; line-height: 1.5; }
  .tl-move { font-size: 11px; color: var(--ink-faint); margin-top: 5px; display: flex; align-items: center; gap: 5px; }
  .tl-move svg { width: 12px; height: 12px; }
  .tl-item.move .tl-dot { background: var(--ink-faint); width: 7px; height: 7px; margin-top: 6px; }

  .tips-card {
    margin: 6px 20px 16px;
    background: var(--green-soft);
    border-radius: 16px;
    padding: 14px 16px;
  }
  .tips-card h3 { font-size: 13px; color: var(--green); }
  .tips-card p { font-size: 12.5px; color: var(--ink-soft); margin-top: 6px; line-height: 1.6; }

  .save-row {
    display: flex; gap: 10px;
    padding: 6px 20px 22px;
  }
  .save-row button {
    flex: 1; padding: 13px; border-radius: 14px; border: none;
    font-size: 13px; font-weight: 700;
    box-shadow: var(--shadow-card);
  }
  .save-row .save { background: var(--blue); color: white; box-shadow: none; }
  .save-row .route { background: var(--bg-elevated); color: var(--ink); }

  .empty-note { text-align: center; padding: 40px 30px; color: var(--ink-faint); font-size: 12.5px; line-height: 1.7; }

  /* スマホ実機では枠を外して全画面アプリ表示にする */
  @media (max-width: 500px) {
    body { padding: 0; }
    .stage-label { display: none; }
    .phone {
      width: 100%;
      height: 100dvh;
      max-height: none;
      border-radius: 0;
      box-shadow: none;
      padding-top: env(safe-area-inset-top, 0);

  return '-';
}

/* ---- 実時刻ベースの営業中判定・混雑度 ---- */
function isOpenNow(p){
  const now = new Date();
  if(p.closedDay !== undefined && now.getDay() === p.closedDay) return false;
  if(!p.hours) return true;
  const h = now.getHours() + now.getMinutes()/60;
  return p.hours.some(([s,e]) => h >= s && h < e);
}
function congestionNow(p){
  const now = new Date();
  let c = p.congestion;
  if(now.getHours() < 10) c -= 1;
  if(now.getDay() === 0 || now.getDay() === 6) c += 1;
  return Math.max(1, Math.min(3, c));
}

function haversine(lat1,lng1,lat2,lng2){
  const R=6371000, r=x=>x*Math.PI/180;
  const dLat=r(lat2-lat1), dLng=r(lng2-lng1);
  const s=Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}

function recomputeDistances(){
  ALL_PLACES.forEach(p=>{
    const d = haversine(currentLoc.lat,currentLoc.lng,p.ll[0],p.ll[1]);
    p.distanceM = Math.round(d);
    const wm = Math.max(1, Math.round(d/75));
    if(wm<=30){ p.walk=wm; p.train=0; }
    else { p.walk=0; p.train=Math.max(5, Math.round(d/450)+8); }
    p.taxi = Math.max(3, Math.round(d/350));
  });
}

/* ---- 外部オープンデータ連携(Wikipedia + OpenStreetMap) ----
   現在地周辺の実在スポットを自動取得してリストに追加する。
   どちらもAPIキー不要・CORS対応の公開APIを使用。 */
let EXTERNAL_PLACES = [];
const EXT_CACHE = {};

function extPlace(o){
  return Object.assign({
    area:'現在地周辺', forWhom:['気になったら立ち寄り'],
    open:'公式情報を確認', closed:'-', budget:'-', hours:null,
    congestion:2, reservation:false, local:false, sns:false, real:true,
    recommend:'外部オープンデータ('+o.source+')から自動取得したスポット。「地図で開く」で詳細を確認できます。',
    caution:'営業状況・料金は事前に公式情報の確認を。', phone:''
  }, o);
}

async function fetchWikiSpots(){
  const url = 'https://ja.wikipedia.org/w/api.php?action=query&format=json&origin=*'
    + '&generator=geosearch&ggscoord=' + currentLoc.lat + '%7C' + currentLoc.lng
    + '&ggsradius=10000&ggslimit=40&prop=coordinates%7Cpageimages%7Cdescription&pithumbsize=640&pilimit=40';
  const res = await fetch(url);
  const data = await res.json();
  const pages = Object.values((data.query||{}).pages||{});
  const skip = /(市|区|郡|府|県|地区|丁目|学校|大学|高校|中学校|小学校|警察|消防|役所|病院|放送|新聞|株式会社|協会|検定|財団|法人|組合|会館|会議所|事務所|本社|支店|銀行|証券|保険|営業所|工場|倉庫|ビル|マンション|変電|浄水|下水)/;
  return pages
    .filter(pg=>pg.coordinates && pg.coordinates[0] && !skip.test(pg.title))
    .map(pg=>{
      const desc = pg.description || 'Wikipediaに掲載されている周辺スポット。';
      const t = pg.title + desc;
      const icon = /寺|神社|宮|城|仏|堂/.test(t) ? 'temple'
                 : /川|橋|池|湖|疏水/.test(t) ? 'river'
                 : /公園|庭園|山|森|林/.test(t) ? 'bamboo'
                 : /市場|商店街/.test(t) ? 'market' : 'view';
      return extPlace({
        id:'wiki-'+pg.pageid, name:pg.title, kind:'sight', icon,
        ll:[pg.coordinates[0].lat, pg.coordinates[0].lon],
        photo: pg.thumbnail ? pg.thumbnail.source : '',
        desc, tags:['周辺スポット','Wikipedia'], source:'Wikipedia'
      });
    }).slice(0,30);
}

async function fetchOsmEats(){
  const q = '[out:json][timeout:25];node["amenity"~"^(restaurant|cafe|bar|pub|fast_food)$"]["name"](around:2000,'
    + currentLoc.lat + ',' + currentLoc.lng + ');out 60;';
  const res = await fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent(q));
  const data = await res.json();
  const cuisineJa = {japanese:'和食', ramen:'ラーメン', sushi:'寿司', italian:'イタリアン', french:'フレンチ',
    chinese:'中華', indian:'インド料理', coffee_shop:'カフェ', cake:'スイーツ', ice_cream:'スイーツ',
    udon:'うどん', soba:'そば', curry:'カレー', pizza:'ピザ', burger:'ハンバーガー', seafood:'海鮮',
    yakitori:'焼き鳥', tofu:'豆腐料理', kaiseki:'会席料理', teahouse:'甘味処', izakaya:'居酒屋', noodle:'麺類'};
  return (data.elements||[])
    .filter(el=>el.tags && el.tags.name && el.lat)
    .map(el=>{
      const t = el.tags;
      const kind = t.amenity==='cafe' ? 'cafe' : 'food';
      const icon = (t.amenity==='bar'||t.amenity==='pub') ? 'bar' : (kind==='cafe' ? 'cafe' : 'food');
      const genre = (t.cuisine||'').split(';').map(c=>cuisineJa[c.trim()]||'').filter(Boolean).join('・')
        || (kind==='cafe' ? 'カフェ' : '飲食店');
      return extPlace({
        id:'osm-'+el.id, name:t.name, kind, icon, genre,
        ll:[el.lat, el.lon], photo:'',
        desc:'OpenStreetMapに登録されている周辺の'+genre+'。',
        tags:['周辺スポット','OpenStreetMap'], source:'OpenStreetMap',
        open: t.opening_hours ? t.opening_hours : '公式情報を確認',
        phone: t.phone || t['contact:phone'] || ''
      });
    }).slice(0,40);
}

function applyExternal(list){
  const names = new Set([...SPOTS, ...RESTAURANTS].map(p=>p.name.replace(/\s/g,'')));
  EXTERNAL_PLACES = list.filter(p=>!names.has(p.name.replace(/\s/g,'')));
  ALL_PLACES = [...SPOTS, ...RESTAURANTS, ...EXTERNAL_PLACES];
  recomputeDistances();
  renderAll();
}

async function fetchExternalPlaces(){
  const key = currentLoc.lat.toFixed(3) + ',' + currentLoc.lng.toFixed(3);
  if(EXT_CACHE[key]){ applyExternal(EXT_CACHE[key]); return; }
  showToast('周辺スポットをWikipedia・OpenStreetMapから取得中…');
  const results = await Promise.allSettled([fetchWikiSpots(), fetchOsmEats()]);
  const found = results.flatMap(r=>r.status==='fulfilled' ? r.value : []);
  if(!found.length){
    showToast('周辺スポットを取得できませんでした(通信状況を確認してください)');
    return;
  }
  EXT_CACHE[key] = found;
  applyExternal(found);
  showToast('周辺スポットを'+EXTERNAL_PLACES.length+'件追加しました');
}

/* 地図座標系: 京都全域(貴船鞍馬〜大原〜宇治)の緯度経度を%座標へ変換 */
const MAP_BOUNDS = {minLng:135.640, maxLng:135.855, minLat:34.870, maxLat:35.140};
function projX(lng){
  const t=(lng-MAP_BOUNDS.minLng)/(MAP_BOUNDS.maxLng-MAP_BOUNDS.minLng);
  return Math.max(4, Math.min(96, t*100));
}
function projY(lat){
  const t=(MAP_BOUNDS.maxLat-lat)/(MAP_BOUNDS.maxLat-MAP_BOUNDS.minLat);
  return Math.max(5, Math.min(93, t*100));
}

function matchesCategory(place, key){
  if(key==='all') return true;
  if(key==='food') return place.kind==='food';
  if(key==='cafe') return place.kind==='cafe';
  if(key==='sight') return place.kind==='sight';
  if(key==='local') return !!place.local;
  if(key==='sns') return !!place.sns;
  if(key==='rain') return place.tags.some(t=>t.includes('雨の日でも'));
  return true;
}

/* ---- 動的プラン生成 ---- */
function hotelToLoc(text){
  const t = text || '';
  const pairs = [['祇園',0],['八坂',0],['河原町',2],['四条',2],['烏丸',2],['清水',3],['東山',3],['嵐山',4],['出町',5],['鴨川',5],['京都駅',1]];
  for(const [k,i] of pairs){ if(t.includes(k)) return LOCATIONS[i]; }
  return LOCATIONS[1];
}
function fmtTime(t){
  const tot = Math.round(t * 60 / 5) * 5;
  return Math.floor(tot/60) + ':' + String(tot % 60).padStart(2, '0');
}
function scoreSpot(p){
  let s = p.rating;
  if(pf.styles.includes('神社仏閣') && p.tags.includes('神社仏閣')) s += 3;
  if(pf.styles.includes('雨の日') && p.tags.some(t=>t.includes('雨の日でも'))) s += 4;
  if(pf.styles.includes('カップル') && (p.forWhom||[]).some(w=>w.includes('カップル'))) s += 2;
  if(pf.styles.includes('子連れ') && (p.forWhom||[]).some(w=>w.includes('家族'))) s += 2;
  if(pf.styles.includes('定番') && !p.local) s += 1.5;
  if(pf.styles.includes('食べ歩き') && (p.tags.includes('お土産') || p.id==='nishiki')) s += 3;
  if(p.sns) s += 0.3;
  return s;
}
function nearestOrder(fromLL, pool){
  const rest = [...pool], out = [];
  let cur = fromLL;
  while(rest.length){
    rest.sort((a,b)=>haversine(cur[0],cur[1],a.ll[0],a.ll[1]) - haversine(cur[0],cur[1],b.ll[0],b.ll[1]));
    const nxt = rest.shift();
    out.push(nxt); cur = nxt.ll;
  }
  return out;
}
function moveBetween(a, b){
  const d = haversine(a[0],a[1],b[0],b[1]);
  if(d < 400) return null;
  if(d <= 1800) return {mode:'徒歩', min:Math.max(5, Math.round(d/75/5)*5)};
  return {mode:'電車', min:Math.max(10, Math.round((d/450+10)/5)*5)};
}

function generatePlan(){
  const hotelText = document.getElementById('pf-hotel').value || '京都駅周辺のホテル';
  const baseLoc = hotelToLoc(hotelText);
  const baseLL = [baseLoc.lat, baseLoc.lng];
  const nDays = pf.days==='日帰り' ? 1 : (pf.days==='1泊2日' ? 2 : 3);
  const slow = pf.styles.includes('ゆったり');
  const kids = pf.styles.includes('子連れ');
  const wantCafe = pf.styles.includes('カフェ巡り');
  const perDay = slow ? 2 : 3;

  // スポット選定: スタイルに合わせスコア順
  let sightPool = SPOTS.slice().sort((a,b)=>scoreSpot(b)-scoreSpot(a));
  if(pf.styles.includes('雨の日')){
    const rainOK = sightPool.filter(p=>p.tags.some(t=>t.includes('雨の日でも')));
    sightPool = rainOK.concat(sightPool.filter(p=>!rainOK.includes(p)));
  }
  const picked = sightPool.slice(0, nDays*perDay);

  // 食事プール
  const cafes = RESTAURANTS.filter(r=>r.kind==='cafe').sort((a,b)=>scoreSpot(b)-scoreSpot(a));
  let lunchPool = RESTAURANTS.filter(r=>r.kind==='food' && r.hours && r.hours[0][0] <= 12);
  let dinnerPool = RESTAURANTS.filter(r=>r.kind==='food' && r.hours && r.hours[r.hours.length-1][1] >= 20);
  if(kids){
    const kl = lunchPool.filter(r=>r.kids); if(kl.length) lunchPool = kl;
    const kd = dinnerPool.filter(r=>r.kids); if(kd.length) dinnerPool = kd;
  }
  const usedMeals = new Set();
  const pickMeal = (pool, nearLL)=>{
    const c = pool.filter(r=>!usedMeals.has(r.id));
    if(!c.length) return null;
    c.sort((a,b)=>haversine(nearLL[0],nearLL[1],a.ll[0],a.ll[1]) - haversine(nearLL[0],nearLL[1],b.ll[0],b.ll[1]));
    usedMeals.add(c[0].id);
    return c[0];
  };

  // 時間帯対応: 日帰りで今が午前〜昼過ぎなら「今から」開始
  const nowH = new Date().getHours();
  let startH = slow ? 10 : 9;
  let startNote = '';
  if(nDays===1 && nowH>=7 && nowH<=13){ startH = nowH + 1; startNote = '(現在時刻に合わせたスタートです)'; }

  const stay = slow ? 2 : 1.5;
  const daysArr = [];
  for(let d=0; d<nDays; d++){
    const items = [];
    let t = startH;
    let curLL = baseLL;
    let lunchDone = false;
    items.push({time:fmtTime(t), place:baseLoc.name+'を出発', note:(d===0 ? '宿泊地: '+hotelText+' '+startNote : 'ホテルから2日目'+(d===2?'・3日目':'')+'スタート。')});

    const queue = nearestOrder(baseLL, picked.slice(d*perDay, (d+1)*perDay));
    if(wantCafe && cafes.length){ queue.splice(Math.min(1, queue.length), 0, cafes[d % cafes.length]); }

    for(const sp of queue){
      if(!lunchDone && t >= 11.5){
        const lu = pickMeal(lunchPool, curLL) || pickMeal(RESTAURANTS.filter(r=>r.kind==='food'), curLL);
        if(lu){
          items.push({time:fmtTime(t), place:lu.name, note:'ランチ: '+lu.recommendedMenu+'がおすすめ。'});
          t += 1.25; curLL = lu.ll; lunchDone = true;
        }
      }
      const mv = moveBetween(curLL, sp.ll);
      if(mv){ items.push({time:fmtTime(t), place:'move', note:'', move:mv}); t += mv.min/60; }
      items.push({time:fmtTime(t), place:sp.name, note:sp.recommend});
      curLL = sp.ll; t += stay;
    }

    if(d < nDays-1){
      const di = pickMeal(dinnerPool, curLL);
      t = Math.max(t, 18.5);
      if(di){ items.push({time:fmtTime(t), place:di.name, note:'ディナー: '+di.recommendedMenu+'。予約がおすすめ。'}); t += 1.5; }
      items.push({time:fmtTime(t), place:baseLoc.name+'へ戻る', note:'ホテルでゆっくり休んで明日に備える。'});
    } else {
      items.push({time:fmtTime(t), place:'帰路へ', note:'お土産の最終チェックをして解散。おつかれさまでした!'});
    }
    daysArr.push(items);
  }

  // Googleマップ用: 各日の巡回ルートURL(宿泊地→立ち寄り順)
  // 実在の観光スポットは名称で指定し、架空の飲食店は座標で指定する
  PLAN_ROUTES = daysArr.map(day=>{
    const pts = day.map(it=>ALL_PLACES.find(p=>p.name===it.place)).filter(Boolean)
      .map(p=> p.kind==='sight' ? p.name+' 京都' : p.ll[0]+','+p.ll[1]);
    if(!pts.length) return null;
    const dest = encodeURIComponent(pts[pts.length-1]);
    const way = pts.slice(0,-1).slice(0,9).map(encodeURIComponent).join('%7C');
    return 'https://www.google.com/maps/dir/?api=1&origin='+baseLL[0]+','+baseLL[1]
      +'&destination='+dest+(way ? '&waypoints='+way : '');
  });

  // 予算目安
  const budgetMap = {'おさえめ':[6,9], '普通':[10,15], '贅沢したい':[18,25]};
  const [lo,hi] = budgetMap[pf.budget] || [10,15];
  const budget = '約 ¥'+(lo*1000*nDays).toLocaleString()+'〜'+(hi*1000*nDays).toLocaleString()+' / 人';

  // 混雑回避のコツ: 選ばれたスポットのおすすめ情報から抽出
  const tipSpot = picked.find(p=>/朝|空い|混雑/.test(p.recommend));
  const tip = tipSpot ? tipSpot.name+': '+tipSpot.recommend : '人気スポットは朝一番に回ると混雑を避けられます。';

  const styleTxt = pf.styles.slice(0,2).join('・') || 'おまかせ';
  const tpl = {
    title: baseLoc.name+'発 '+pf.days+' '+styleTxt+'プラン',
    budget, tip, days: daysArr
  };
  renderPlanDetail(tpl, hotelText);
  go('plan-detail');
}

    ${daysHtml}
    <div class="tips-card">
      <h3>混雑を避けるコツ</h3>
      <p>${tpl.tip}</p>

    <div class="section-head"><h2>予算目安</h2></div>
    <p style="padding:0 20px; font-size:13px; color:var(--ink-soft);">${tpl.budget}</p>
    <div class="save-row" style="margin-top:18px;">

      <button class="save" onclick="showToast('プランを保存しました(プロトタイプ)')">プランを保存</button>

/* PC対応: 横スクロール列(レール・チップ)をマウスドラッグ/ホイールで操作できるように */
function enableDragScroll(){
  document.querySelectorAll('.rail, .chiprow').forEach(el=>{
    /* 縦ホイールを横スクロールに変換 */
    el.addEventListener('wheel', e=>{
      if(el.scrollWidth <= el.clientWidth) return;
      if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
        el.scrollLeft += e.deltaY;
        e.preventDefault();
      }
    }, {passive:false});
    /* ドラッグでスクロール(ドラッグ後のクリック誤発火は抑止) */
    let down=false, dragged=false, startX=0, startLeft=0;
    el.addEventListener('pointerdown', e=>{
      if(e.pointerType !== 'mouse') return;
      down=true; dragged=false; startX=e.clientX; startLeft=el.scrollLeft;
    });
    el.addEventListener('pointermove', e=>{
      if(!down) return;
      const dx = e.clientX - startX;
      if(Math.abs(dx) > 6){ dragged=true; el.scrollLeft = startLeft - dx; }
    });
    const end = ()=>{ down=false; };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointerleave', end);
    el.addEventListener('click', e=>{
      if(dragged){ e.stopPropagation(); e.preventDefault(); dragged=false; }
    }, true);
  });
}
